name: Build unsigned WebDriverAgent IPA

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install dependencies
        run: |
          if [ -f "Scripts/bootstrap.sh" ]; then
            chmod +x Scripts/bootstrap.sh
            Scripts/bootstrap.sh
          fi

      - name: Build WebDriverAgentRunner unsigned
        run: |
          xcodebuild \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Make unsigned IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "WebDriverAgentRunner-Runner.app" | head -n 1)

          echo "APP_PATH=$APP_PATH"

          if [ -z "$APP_PATH" ]; then
            echo "App not found"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/
          zip -r WebDriverAgentRunner-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgentRunner-unsigned
          path: WebDriverAgentRunner-unsigned.ipa
